services:
  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command:
      [
        "uvicorn",
        "main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    environment:
      # Reliable reload when the app runs in Docker Desktop (macOS/Windows)
      WATCHFILES_FORCE_POLLING: "true"
    restart: unless-stopped
